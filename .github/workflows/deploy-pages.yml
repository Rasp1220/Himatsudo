name: Deploy Mockups to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'mockup-*.html'
      - 'preview/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare preview directory
        run: |
          mkdir -p _site
          cp mockup-*.html _site/
          cp preview/index.html _site/index.html

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
