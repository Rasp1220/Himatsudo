name: Test Suite

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# Prevent multiple CI runs overlapping on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # PHP Unit Tests (no database required)
  # ─────────────────────────────────────────────
  php-unit:
    name: PHP Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        env:
          JWT_SECRET: test-jwt-secret-key-for-ci-unit-tests-only32
        run: vendor/bin/phpunit --testdox

  # ─────────────────────────────────────────────
  # Vue Unit Tests (Vitest)
  # ─────────────────────────────────────────────
  vue-unit:
    name: Vue Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cms/package-lock.json

      - name: Install CMS dependencies
        run: npm ci
        working-directory: cms

      - name: Run Vitest
        run: npm test
        working-directory: cms

  # ─────────────────────────────────────────────
  # Playwright E2E Tests (needs MySQL + servers)
  # ─────────────────────────────────────────────
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: himatsudo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_DSN: mysql:host=127.0.0.1;dbname=himatsudo_test;charset=utf8mb4
      DB_USER: root
      DB_PASSWORD: ''
      JWT_SECRET: test-jwt-secret-key-for-ci-e2e-tests-only-32c
      VITE_API_BASE_URL: http://localhost:8080/admin/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cms/package-lock.json

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install CMS dependencies
        run: npm ci
        working-directory: cms

      - name: Install Playwright dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Run DB migrations
        run: php bin/migrate.php

      - name: Seed test database
        run: php tests/e2e/setup/seed-test-db.php

      - name: Run Playwright tests
        env:
          CI: 'true'
          E2E_ADMIN_EMAIL: e2e-admin@example.com
          E2E_ADMIN_PASSWORD: test-password-e2e
          E2E_CMS_URL: http://localhost:5173
          E2E_API_URL: http://localhost:8080
        run: npx playwright test
        working-directory: tests/e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
