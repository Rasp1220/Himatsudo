name: Test Suite

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# Prevent multiple CI runs overlapping on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. PHP Code Format Check (PHP CS Fixer)
  # ─────────────────────────────────────────────
  php-format:
    name: PHP Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check code formatting
        run: vendor/bin/php-cs-fixer check --no-interaction --diff

  # ─────────────────────────────────────────────
  # 2. Psalm Static Analysis (level 6)
  # ─────────────────────────────────────────────
  psalm:
    name: Psalm (level 6)
    runs-on: ubuntu-latest
    needs: [php-format]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Psalm
        run: vendor/bin/psalm --no-progress --output-format=github

  # ─────────────────────────────────────────────
  # 3. Vue Unit Tests (Vitest)
  # ─────────────────────────────────────────────
  vue-unit:
    name: Vue Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cms/package-lock.json

      - name: Install CMS dependencies
        run: npm ci
        working-directory: cms

      - name: Run Vitest
        run: npm test
        working-directory: cms

  # e2e job is temporarily disabled — see issue #32
