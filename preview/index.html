<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひまつど — モバイルプレビュー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #eaf6fd;
      color: #1e3a4a;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }
    header {
      background: #1a3a5c;
      color: #fff;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      text-align: center;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .05em;
    }
    header p {
      font-size: 0.85rem;
      opacity: .75;
      margin-top: .4rem;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .card {
      display: block;
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: #1e3a4a;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      border-left: 5px solid #29aae1;
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active {
      transform: scale(.98);
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .card-desc {
      font-size: 0.85rem;
      color: #5a7a8a;
      margin-top: .3rem;
    }
    footer {
      text-align: center;
      font-size: .75rem;
      color: #8aaa ba;
      margin-top: 2.5rem;
      opacity: .6;
    }
  </style>
</head>
<body>
  <header>
    <h1>ひまつど モバイルプレビュー</h1>
    <p>各ページをタップして表示を確認できます</p>
  </header>

  <div class="cards">
    <a class="card" href="mockup-top.html">
      <div class="card-title">トップページ</div>
      <div class="card-desc">サイトのホーム画面</div>
    </a>
    <a class="card" href="mockup-blog.html">
      <div class="card-title">ブログ一覧</div>
      <div class="card-desc">記事リスト・カード表示</div>
    </a>
    <a class="card" href="mockup-article-detail.html">
      <div class="card-title">記事詳細</div>
      <div class="card-desc">通常の記事ページ</div>
    </a>
    <a class="card" href="mockup-article-detail-youtube.html">
      <div class="card-title">記事詳細（YouTube）</div>
      <div class="card-desc">YouTube埋め込みあり記事</div>
    </a>
  </div>

  <footer>ひまつど開発プレビュー</footer>
</body>
</html>
